name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # every Monday at 06:00 UTC

permissions:
  contents: read

jobs:
  trivy:
    name: Trivy Go Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy vulnerability scan (Go modules)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          vuln-type: library
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: '1'
          format: table
